# ═══════════════════════════════════════════════════════════════
# APP TIER — Node.js Express API Deployment
# ═══════════════════════════════════════════════════════════════

apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  labels:
    app: gke-store
    tier: app
spec:
  replicas: 2              # 2 pods for HA — GKE Autopilot schedules on separate nodes
  selector:
    matchLabels:
      app: backend
      tier: app
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1          # Allow 1 extra pod during update
      maxUnavailable: 0    # Never bring availability below 2 pods
  template:
    metadata:
      labels:
        app: backend
        tier: app
    spec:
      # ── Wait for DB to be ready before starting ──────────────
      initContainers:
        - name: wait-for-postgres
          image: busybox:1.36
          command:
            - sh
            - -c
            - |
              echo "Waiting for PostgreSQL..."
              until nc -z postgres-service 5432; do
                echo "postgres not ready, retrying in 3s..."
                sleep 3
              done
              echo "PostgreSQL is ready!"
          resources:
            requests:
              cpu:    "10m"
              memory: "16Mi"
            limits:
              cpu:    "50m"
              memory: "32Mi"

      containers:
        - name: backend
          # ── REPLACE with your Artifact Registry image path ──
          # Format: REGION-docker.pkg.dev/PROJECT_ID/REPO_NAME/IMAGE:TAG
          # Example: asia-south1-docker.pkg.dev/feasibility-491311/store-repo/store-backend:latest
          image: image: asia-south1-docker.pkg.dev/trailakshit/my-repo/backend:7f3a58b
          imagePullPolicy: Always
          ports:
            - containerPort: 3000
              name: http

          # ── Environment from ConfigMap + Secret ──────────────
          env:
            - name: DB_HOST
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: DB_HOST
            - name: DB_PORT
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: DB_PORT
            - name: DB_NAME
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: DB_NAME
            - name: DB_USER
              valueFrom:
                configMapKeyRef:
                  name: postgres-config
                  key: DB_USER
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: postgres-secret
                  key: DB_PASSWORD
            - name: PORT
              value: "3000"
            - name: NODE_ENV
              value: "production"

          # ── Resource limits ───────────────────────────────────
          resources:
            requests:
              cpu:    "100m"
              memory: "128Mi"
            limits:
              cpu:    "500m"
              memory: "256Mi"

          # ── Health checks ─────────────────────────────────────
          readinessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 10
            periodSeconds: 5

          livenessProbe:
            httpGet:
              path: /health
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 3

---
# ═══════════════════════════════════════════════════════════════
# APP TIER — Backend Service (ClusterIP)
# The Frontend (nginx) talks to "backend-service:3000" —
# this DNS name resolves inside the cluster only.
# ═══════════════════════════════════════════════════════════════

apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: store
  labels:
    app: gke-store
    tier: app
spec:
  type: ClusterIP          # NOT exposed to internet — only web tier can reach it
  selector:
    app: backend
    tier: app
  ports:
    - name: http
      port: 3000
      targetPort: 3000
