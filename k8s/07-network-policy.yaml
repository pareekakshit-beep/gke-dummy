# ═══════════════════════════════════════════════════════════════
# NetworkPolicy — Zero-trust between tiers
#
# Rules:
#   - Frontend can reach Backend (web → app)
#   - Backend can reach Postgres (app → data)
#   - Postgres rejects ALL other traffic
#   - Backend rejects traffic NOT from frontend
#
# This enforces the multi-tier security model at the network level.
# ═══════════════════════════════════════════════════════════════

# Policy 1: Postgres only accepts connections from backend pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: postgres-network-policy
  namespace: store
spec:
  podSelector:
    matchLabels:
      app: postgres
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: backend      # Only backend pods can connect
      ports:
        - protocol: TCP
          port: 5432
  egress: []                    # Postgres initiates no outbound connections

---
# Policy 2: Backend only accepts connections from frontend pods
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: backend-network-policy
  namespace: store
spec:
  podSelector:
    matchLabels:
      app: backend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app: frontend     # Only frontend pods can call the API
      ports:
        - protocol: TCP
          port: 3000
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: postgres     # Backend can only reach postgres
      ports:
        - protocol: TCP
          port: 5432
    - ports:                    # Allow DNS resolution
        - protocol: UDP
          port: 53

---
# Policy 3: Frontend accepts traffic from anywhere (public)
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: frontend-network-policy
  namespace: store
spec:
  podSelector:
    matchLabels:
      app: frontend
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - {}                        # Accept from load balancer (any source)
  egress:
    - to:
        - podSelector:
            matchLabels:
              app: backend      # Frontend can only reach backend
      ports:
        - protocol: TCP
          port: 3000
    - ports:
        - protocol: UDP
          port: 53              # Allow DNS
