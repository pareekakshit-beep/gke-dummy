apiVersion: v1
kind: Secret
metadata:
  name: postgres-secret
  namespace: store
  labels:
    app: gke-store
    tier: data
type: Opaque
# Values are base64-encoded.
# To encode your own: echo -n "mypassword" | base64
# IMPORTANT: In production, use Google Secret Manager or Workload Identity
# instead of storing secrets directly in YAML files.
stringData:
  # stringData allows plain text — Kubernetes will base64 encode automatically
  POSTGRES_PASSWORD: "StorePass@2024"
  DB_PASSWORD:       "StorePass@2024"
