server {
    listen 80;
    server_name _;

    # Serve static frontend files
    root /usr/share/nginx/html;
    index index.html;

    # ── Proxy /api/* and /health to App Tier ──────────────────────
    # "backend-service" is the Kubernetes Service name.
    # Inside the cluster, this resolves to the app tier pods.
    location /api/ {
        proxy_pass         http://backend-service:3000/api/;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    location /health {
        proxy_pass http://backend-service:3000/health;
    }

    # ── Serve SPA — fallback to index.html ────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────
    add_header X-Frame-Options        SAMEORIGIN;
    add_header X-Content-Type-Options nosniff;
    add_header X-XSS-Protection       "1; mode=block";

    # ── Cache static assets ───────────────────────────────────────
    location ~* \.(js|css|png|jpg|svg|ico)$ {
        expires 1d;
        add_header Cache-Control "public, immutable";
    }

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
